let selectedId = null;

function countStat(fn) {
  return Object.values(PRELOADED).filter(fn).length;
}

function renderStats() {
  const stats = [
    { label: "Full framework", value: countStat(r => r.framework_order.length === 5) },
    { label: "True dystopian endings", value: countStat(r => !r.stages["new beginning"].present) },
    { label: "Missing excess", value: countStat(r => !r.stages["excess"].present) },
    { label: "Reordered", value: countStat(r => {
      const order = r.framework_order;
      const present = STAGES.filter(s => r.stages[s].present);
      const reordered = present.filter(s => order.includes(s));
      return JSON.stringify(order) !== JSON.stringify(reordered);
    }) },
  ];
  return stats.map(s => `
    <div>
      <div style="font-size:22px;font-weight:600;color:#1A1A1A">${s.value}</div>
      <div style="font-size:10px;color:#BBB;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px">${s.label}</div>
    </div>
  `).join('');
}

function renderLegend() {
  return STAGES.map(s => `
    <div style="display:flex;align-items:center;gap:6px">
      <div style="width:16px;height:5px;background:${STAGE_COLORS[s]};border-radius:1px"></div>
      <span style="font-size:10px;color:#AAA;text-transform:uppercase;letter-spacing:0.08em">${STAGE_LABELS[s]}</span>
    </div>
  `).join('') + `
    <div style="display:flex;align-items:center;gap:6px">
      <svg width="16" height="5"><circle cx="2" cy="2.5" r="1" fill="#D8D8D8"/><circle cx="8" cy="2.5" r="1" fill="#D8D8D8"/><circle cx="14" cy="2.5" r="1" fill="#D8D8D8"/></svg>
      <span style="font-size:10px;color:#CCC;text-transform:uppercase;letter-spacing:0.08em">uncharted</span>
    </div>
  `;
}

function renderArcBar(film) {
  const result = PRELOADED[film.id];
  const stageBars = STAGES.map(stage => {
    const s = result.stages[stage];
    if (!s || !s.present) return '';
    const opacity = 0.75 + s.intensity * 0.025;
    return `<div title="${STAGE_LABELS[stage]}: ${s.note}" style="position:absolute;left:${s.start}%;width:${Math.max(s.end - s.start, 3)}%;height:100%;background:${STAGE_COLORS[stage]};opacity:${opacity}"></div>`;
  }).join('');

  return `
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:220px;min-width:220px;text-align:right;font-size:11px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
        ${film.title}<span style="color:#BBB;margin-left:6px">${film.year}</span>
      </div>
      <div style="flex:1;height:20px;background:#F0F0F0;position:relative;border-radius:2px;overflow:hidden">
        <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none">
          <defs>
            <pattern id="gap-${film.id}" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse">
              <circle cx="2" cy="2" r="0.8" fill="#D8D8D8"/>
            </pattern>
          </defs>
          <rect width="100%" height="100%" fill="url(#gap-${film.id})"/>
        </svg>
        ${stageBars}
      </div>
      <div style="width:200px;min-width:200px;font-size:10px;color:#AAA;line-height:1.3">
        ${result.framework_order.join(' → ')}
      </div>
    </div>
  `;
}

function renderDetail(film) {
  if (!film) return '';
  const result = PRELOADED[film.id];

    const s = result.stages[stage];
    const present = s && s.present;
    return `

        <div style="width:8px;height:8px;min-width:8px;background:${present ? STAGE_COLORS[stage] : '#DDD'};border-radius:50%;margin-top:4px"></div>
        <div>
          <div style="font-size:10px;font-weight:600;color:${present ? STAGE_COLORS[stage] : '#CCC'};text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px">
            ${STAGE_LABELS[stage]}
            ${present ? `<span style="color:#BBB;margin-left:8px;text-transform:none;letter-spacing:0;font-weight:400">${s.start}% – ${s.end}% · ${s.intensity}/10</span>` : ''}
          </div>
          ${present ? `<div style="font-size:11px;color:#666;line-height:1.6">${s.note}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="detail-panel">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div style="font-weight:600;font-size:16px;color:#1A1A1A">${film.title}</div>
        <button onclick="closeDetail()" style="background:none;border:none;color:#BBB;font-family:Inter,sans-serif;font-size:11px;cursor:pointer">✕</button>
      </div>
      <div style="font-size:11px;color:#AAA;margin-bottom:20px">${film.year} · ${film.genre}</div>
      <div style="margin-bottom:16px">${stageRows}</div>
      <div style="border-top:1px solid #EBEBEB;padding-top:14px;font-size:11px;color:#999;font-style:italic;line-height:1.7">${result.deviation_note}</div>
    </div>
  `;
}

function closeDetail() {
  selectedId = null;
  render();
}

function toggleFilm(id) {
  selectedId = selectedId === id ? null : id;
  render();
}

function render() {
  const selectedFilm = selectedId ? FILMS.find(f => f.id === selectedId) : null;

  const filmRows = FILMS.map(film => `
    <div class="film-row ${selectedId === film.id ? 'active' : ''}" onclick="toggleFilm(${film.id})">
      ${renderArcBar(film)}
    </div>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div style="max-width:960px">
      <div style="margin-bottom:40px;max-width:800px">
        <div style="font-size:10px;font-weight:600;color:#BBB;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:10px">MFA Thesis Research</div>
        <div style="font-size:26px;font-weight:600;color:#1A1A1A;line-height:1.3;margin-bottom:12px">
          Amplification → Excess → Collapse → Blank → New Beginning
        </div>
        <div style="font-size:12px;color:#999;line-height:1.8;max-width:540px">
          20 film narratives coded through a 5-stage framework. New beginning defined as the absence of total dystopian closure — survival and continuation qualify.
        </div>
      </div>

      <div style="display:flex;gap:32px;margin-bottom:36px">
        ${renderStats()}
      </div>

      <div style="display:flex;gap:20px;margin-bottom:28px;flex-wrap:wrap;align-items:center">
        ${renderLegend()}
      </div>

      <div style="margin-bottom:24px">
        ${filmRows}
      </div>

      ${selectedFilm ? renderDetail(selectedFilm) : ''}
    </div>
  `;
}

render();
</script>
</body>
</html>
